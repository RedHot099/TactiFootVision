# config/default_config.yaml
project_name: "tactifoot_vision"
logging_level: "INFO"

paths:
  input_video: "../data/videos/tac_1.mp4"
  output_video: "../output/output_tac_1.mp4"
  model_dir: "../models"
  statsbomb_input_csv: "output/statsbomb_merged.csv"
  pipeline_input_csv: "output/output_tac_1_pipelinedata_p1.csv"
  merged_output_csv: "output/merged_output_period1.csv" # Example: Output for period 1

detection:
  model_type: "yolo"
  # checkpoint_path: "../models/yolov9-e.pt" # Example for inference/fine-tune
  # checkpoint_path: "../output/checkpoint_best_total.pth" # Example for training from scratch
  confidence_threshold: 0.3
  nms_threshold: 0.5
  classes:
    ball: 0
    goalkeeper: 1
    player: 2
    referee: 3

training:
  detection:
    base_model: "yolov12x.pt" 
    dataset_path: "../data/datasets/football_yolo/data.yaml"
    # dataset_path: "/home/kuba/uam/doktorat/datasets/football-dataset"
    ultralytics_assets_tag: "v8.3.0"
    epochs: 3
    batch_size: 4
    imgsz: 640
    learning_rate: 0.001
    optimizer: "Adam"
    project_name: "output"
    run_name: "detect_run_v1"
    device: null
    plots: true

  keypoints:
    dataset_path: "../data/keypoints/data.yaml"
    base_model: "yolov8n-pose.pt" # Or yolov11 variant if available
    ultralytics_assets_tag: "v8.3.0"
    # Training Hyperparams
    epochs: 1000
    batch_size: 8
    imgsz: 640
    learning_rate: 0.001
    optimizer: "auto"
    project_name: "tactifoot_kp_training"
    run_name: "yolo_pose_run1"
    device: null
    plots: true

tracking:
  enabled: true
  backend: "bytetrack"  # one of: bytetrack, sam2
  # Corrected ByteTrack params (use supervision defaults if null)
  track_activation_threshold: 0.25 # Formerly track_activation_threshold
  lost_track_buffer: 30 # Formerly track_buffer
  minimum_matching_threshold: 0.8 # Formerly match_thresh
  frame_rate: null # e.g., 30 or null
  minimum_consecutive_frames: 1 # Default is 1
  sam2:
    checkpoint_path: null   # e.g., ../external/segment-anything-2-real-time/checkpoints/sam2.1_hiera_large.pt
    config_path: null       # e.g., ../external/segment-anything-2-real-time/configs/sam2.1/sam2.1_hiera_l.yaml
    mask_filter_distance: 300.0
    reseed_interval: null
    reseed_iou_threshold: 0.3

keypoints:
  enabled: true
  model_type: "yolo_pose"
  checkpoint_path: "../tactifoot_kp_training/yolo_pose_run16/weights/best.pt"
  confidence_threshold: 0.8

geometry:
  min_keypoint_confidence_for_homography: 0.1
  homography_smoothing_window: 10
  ball_outlier_threshold_percent: 5
  target_pitch_length: 120
  target_pitch_width: 80

visualization:
  enabled: true
  pitch_color: "#000000"
  line_color: "#808080"
  player_color_default: "#FFFFFF"
  ball_color: "#FFFF00"
  team_color_0: "#00BFFF"
  team_color_1: "#FF1493"
  overlay: true
  overlay_width_fraction: 0.25
  overlay_position: "bottom-center"
  overlay_padding: 10
  overlay_alpha: 0.8
  draw_projected_pitch: true
  draw_segmentation_masks: false
  draw_bounding_boxes: true
  draw_scale: 0.05
  draw_padding: 20

processing:
  period: 1 # Set this to the period corresponding to the pipeline_input_csv file
  period_start_time_seconds: 0.0
