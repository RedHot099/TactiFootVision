name: video_xg_stage_1_ball_smoke
kind: video_xg
soccernet_root: data/soccernet/tracking/extracted/train
max_sequences: 1
max_frames: 32
output_dir: results/experiments/video_xg_stage_1_ball_smoke
video_xg:
  ball:
    method: linear
    max_speed_pixels_per_frame: 120.0
  shots:
    kind: metadata
    use_soccernet_metadata: true
    window_before: 64
    window_after: 32
    max_candidates: 1
  xg:
    model: geometry
    image_width: 1920
    image_height: 1080
pipeline:
  name: video_xg_stage_1_ball_smoke
  detection:
    backend: fake
  tracking:
    backend: fake
